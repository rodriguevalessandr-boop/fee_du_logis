<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fée du Logis</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Berkshire+Swash&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Emilys+Candy&display=swap" rel="stylesheet">
</head>

<body>

  <div class="app-container">

    <!-- HEADER -->
    <header class="app-header">

<div class="app-main-title">
   <span class="fairy-sparkle">🧚</span> Fée du Logis
</div>

      <div class="header-row-2">
        <button class="diamonds-display" id="diamonds-btn">
          💎 <span id="diamond-count">0</span>
        </button>
      </div>
  
        <div class="streak-pill">
    <span id="streak-fire" class="hidden">🔥</span>
          Jour <span id="day-count">0</span>
        </div>

   <div class="header-btns-group">
    <button class="notif-btn" id="notif-btn">🕐</button>
    <button class="add-task-btn" id="add-task-btn">+</button>
  </div>
</div>

    </header>

    <!-- CRÉATURE -->
   <div class="creature-container-box">
  <div class="creature-circle">
    <div class="creature-emoji" id="creature-emoji">🧚</div>
  </div>
</div>
<div id="creature-stage">Chargement...</div>

    <!-- JAUGE XP -->
    <div class="xp-gauge-wrap">
      <div class="xp-numbers">
        <span id="xp-current">0</span> / 500 XP
      </div>
      <div class="xp-track">
        <div class="xp-fill" id="xp-fill"></div>
      </div>
    </div>

    <!-- MANTRA -->
  <div id="mantra-container">✨ Prête pour un peu de magie ? </div>

    <!-- MISSIONS DU JOUR -->
    <section class="tasks-section">
      <h2 class="tasks-title">🗝️ Missions du jour</h2>
      <div id="tasks-list"></div>
    </section>

    <!-- AVENIR -->
    <section class="tasks-section">
      <h2 class="tasks-title">🔮 Avenir</h2>
      <div id="future-tasks-list"></div>
    </section>

  </div>

  <!-- MODAL RÉVEIL -->
 <div class="modal-overlay hidden" id="notif-modal">
    <div class="modal">
      <h3 class="modal-title-magic">⏰ Rappel quotidien</h3>
      <p class="modal-text-intro"></p>
<input type="time" id="notif-time" class="notif-input">

<div class="modal-buttons-container">
  <button id="btn-annuler-notif" class="btn-magic btn-cancel">
    💨 Annuler! 💨
  </button>
  <button id="btn-sauver-notif" class="btn-magic btn-confirm">
    ✨ Valider ! ✨
  </button>
</div>
      </div>
    </div>
  </div>

 <!-- MODAL NOUVELLE TÂCHE -->
<div class="modal-overlay hidden" id="task-modal">
  <div class="modal">
    <div class="modal-header">
      <h1 class="modal-title-magic">✨Enchantement prévu✨ <span class="fairy-sparkle">🧚</span></h1>
      <div class="modal-subtitle">Inscris ce geste dans ton Grimoire.</div>
    </div>

    <div class="form-group">
      <label class="modal-label">Nom de l'Incantation</label>
      <input type="text" id="task-nom" placeholder="Ex: Chasser les ombres..." class="modal-input">
    </div>

    <div class="form-group">
      <label class="modal-label">Royaume de la Maison</label>
      <select id="task-piece" class="modal-input">
        <option value="🌿 Salon de Thé">🌿 Salon de Thé</option>
        <option value="🍲 Cuisine Alchimique">🍲 Cuisine Alchimique</option>
        <option value="🪞 Lieu des Songes">🪞 Lieu des Songes</option>
        <option value="🛁 Source Pure">🛁 Source Pure</option>
        <option value="📚 Bureau des Sorts">📚 Bureau des Sorts</option>
        <option value="🏠 Sanctuaire Entier">🏠 Sanctuaire Entier</option>
        <option value="🚪 Hall des Murmures">🚪 Hall des Murmures</option>
      </select>
    </div>

<div class="form-row-vertical">
      <div class="form-group">
        <label class="modal-label">Lancement</label>
        <select id="task-lancement" class="modal-input">
<option value="0">🍭 Aujourd'hui </option>
<option value="+1">🫧Dès demain</option>
<option value="+2">🪷Surlendemain</option>
<option value="+7">🌺Semaine prochaine</option>
<option value="+14"> 💐Dans deux semaines</option>
<option value=" +30"> 🌺Un mois </option>
</select>
</div>

<div class="form-group">
        <label class="modal-label">Fréquence du Sortilège</label>
        <select id="task-frequence" class="modal-input">
<option value="Quotidienne">Quotidienne</option>
<option value=" 3 jours" >Tous les trois jours</option>
<option value="Hebdomadaire">Dans 7 jours</option>
<option value="Bimensuelle">Deux fois par mois</option>
<option value="Mensuelle">Tous les mois</option>
<option value="Ponctuelle">Ponctuelle</option>     
</select>
</div>

<div class="form-group">
        <label class="modal-label">Résonnance</label>
        <select id="task-xp" class="modal-input">
          <option value="10">✨ Petit Geste (10 XP)</option>
          <option value="25">🌟 Bel Effort (25 XP)</option>
          <option value="40">🔥 Grande Quête (40 XP)</option>
        </select>
      </div>
    </div>



<div class="modal-buttons-container">
      <button id="btn-annuler" class="btn-magic btn-cancel">💨 Annuler! 💨</button>
      <button id="btn-sauvegarder" class="btn-magic btn-confirm">✨ Valider ! ✨</button>
    </div>
  </div>
</div>

  <!-- MODAL BOUTIQUE -->
<div class="modal-overlay hidden" id="shop-modal">
  <div class="modal">
    <h3 class="modal-title-magic">✨ Boutique ✨</h3>
    <p class="shop-diamonds-text">Tes diamants : <span id="shop-diamonds">0</span> 💎</p>
    <div id="shop-items" class="shop-grid"></div>
<button id="btn-fermer-boutique" class="btn-magic btn-confirm btn-full-width">
  ← Retour
</button>
  </div>
</div>

  <script src="app.js"></script>
</body>
</html>
