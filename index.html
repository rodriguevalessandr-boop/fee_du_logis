<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fée du Logis</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Berkshire+Swash&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="app-container">

    <!-- HEADER -->
 <header class="app-header">

  <!-- Ligne 1 : Titre -->
  <h1 class="app-title">🧚 Fée du logis</h1>

  <!-- Ligne 2 : Diamants seul à gauche -->
  <div class="header-row-2">
    <button class="diamonds-display" id="diamonds-btn">
      💎 <span id="diamond-count">0</span>
    </button>
  </div>

  <!-- Ligne 3 : Jour + Réveil + Bouton + sur la même ligne -->
  <div class="header-row-3">
    <div class="streak-pill">
      <span id="streak-fire" style="display:none;">🔥</span>
      Jour <span id="day-count">0</span>
    </div>
    <button class="notif-btn" id="notif-btn">🕐</button>
    <button class="add-task-btn" id="add-task-btn">+</button>
  </div>

</header>

    <!-- CRÉATURE -->
<div class="creature-container-box">
  <div class="creature-circle">
    <div class="creature-emoji" id="creature-emoji">🧚</div>
  </div>
  <div id="creature-stage">Chargement...</div>
</div>

    <!-- JAUGE XP -->
    <div class="xp-gauge-wrap">
      <div class="xp-numbers"><span id="xp-current">0</span> / 500 XP</div>
      <div class="xp-track">
        <div class="xp-fill" id="xp-fill"></div>
      </div>
    </div>

    <!-- MANTRA -->
    <div id="mantra-container" style="opacity:0">Prête pour un peu de magie ? ✨</div>

    <!-- MISSIONS DU JOUR -->
    <section class="tasks-section">
      <h2 class="tasks-title">Missions du jour</h2>
      <div id="tasks-list"></div>
    </section>

   <!-- AVENIR -->
<section class="tasks-section">
  <h2 class="tasks-title">🔮 Avenir</h2>
  <div id="future-tasks-list"></div>
</section>
  </div>

  <!-- MODAL RÉVEIL -->
  <div class="modal-overlay hidden" id="notif-modal">
    <div class="modal">
      <h3 style="font-family:'Berkshire Swash'; text-align:center;">⏰ Rappel quotidien</h3>
      <p style="text-align:center; color:#8a7060;">Choisir l'heure de ta notification :</p>
      <input type="time" id="notif-time"
             style="width:100%; padding:12px; border-radius:10px;
                    border:1px solid #eaddff; font-size:20px;
                    text-align:center; margin:15px 0; box-sizing:border-box;">
      <div style="display:flex; gap:10px;">
        <button id="btn-annuler-notif"
                style="flex:1; padding:10px; border-radius:10px;
                       border:none; background:#eee; cursor:pointer;">
          Annuler
        </button>
        <button id="btn-sauver-notif"
                style="flex:1; padding:10px; border-radius:10px;
                       border:none; background:#c4a8e8;
                       color:white; cursor:pointer; font-weight:bold;">
          Enregistrer ✓
        </button>
      </div>
    </div>
  </div>

  <!-- MODAL NOUVELLE TÂCHE -->
  <div class="modal-overlay hidden" id="task-modal">
    <div class="modal">
      <h3 style="font-family:'Berkshire Swash';">Nouvelle Mission</h3>

      <label class="form-label">Nom de la mission :</label>
      <input type="text" id="task-nom" placeholder="Ex: Faire la vaisselle"
             style="width:100%; padding:10px; margin-bottom:10px;
                    border-radius:10px; border:1px solid #ddd; box-sizing:border-box;">

      <label class="form-label">Pièce :</label>
      <input type="text" id="task-piece" placeholder="Ex: Cuisine"
             style="width:100%; padding:10px; margin-bottom:10px;
                    border-radius:10px; border:1px solid #ddd; box-sizing:border-box;">

      <label class="form-label">XP :</label>
      <select id="task-xp"
              style="width:100%; padding:10px; margin-bottom:10px;
                     border-radius:10px; border:1px solid #ddd;">
        <option value="10">10 XP (Facile)</option>
        <option value="25">25 XP (Moyen)</option>
        <option value="40">40 XP (Difficile)</option>
      </select>

      <label class="form-label">Fréquence :</label>
      <select id="task-frequence"
              style="width:100%; padding:10px; margin-bottom:10px;
                     border-radius:10px; border:1px solid #ddd;">
        <option value="Quotidienne">Chaque jour</option>
        <option value="Tous les 3 jours">Tous les 3 jours</option>
        <option value="Hebdomadaire">Hebdomadaire (7j)</option>
        <option value="Bimensuelle">Bimensuelle (14j)</option>
        <option value="Ponctuelle">Une seule fois</option>
      </select>

      <label class="form-label">Lancement :</label>
      <select id="task-lancement"
              style="width:100%; padding:10px; margin-bottom:20px;
                     border-radius:10px; border:1px solid #ddd;">
        <option value="+0">Aujourd'hui</option>
        <option value="+1">Demain</option>
        <option value="+2">Après-demain</option>
        <option value="+3">Dans 3 jours</option>
        <option value="+7">Dans une semaine</option>
      </select>

      <div style="display:flex; gap:10px;">
        <button id="btn-annuler"
                style="flex:1; padding:10px; border-radius:10px;
                       border:none; background:#eee; cursor:pointer;">
          Annuler
        </button>
        <button id="btn-sauvegarder"
                style="flex:1; padding:10px; border-radius:10px;
                       border:none; background:#00c2a7;
                       color:white; cursor:pointer;">
          Ajouter ✓
        </button>
      </div>
    </div>
  </div>

  <!-- MODAL BOUTIQUE -->
  <div class="modal-overlay hidden" id="shop-modal">
    <div class="modal">
      <h3 style="font-family:'Berkshire Swash'; text-align:center;">Boutique ✨</h3>
      <p style="text-align:center;">Tes diamants : <span id="shop-diamonds">0</span> 💎</p>
      <div id="shop-items"
           style="display:grid; grid-template-columns:1fr 1fr;
                  gap:10px; margin-bottom:20px; max-height:60vh; overflow-y:auto;">
      </div>
      <button id="btn-fermer-boutique"
              style="width:100%; padding:12px; border-radius:10px;
                     border:none; background:#c4a8e8;
                     color:white; font-weight:bold; cursor:pointer;">
        ← Retour
      </button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
